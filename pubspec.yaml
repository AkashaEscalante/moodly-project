name: moodly
description: A wellness mobile app for mood tracking and self-care.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^12.1.3
  supabase_flutter: ^2.3.4
  fl_chart: ^0.66.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  # ACTUALIZADO: Esta versión corrige el error del bigLargeIcon
  flutter_local_notifications: ^21.0.0 
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_dotenv: ^5.1.0
  uuid: ^4.2.1
  intl: ^0.19.0
  gap: ^3.0.1
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/